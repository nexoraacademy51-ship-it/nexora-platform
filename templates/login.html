<!DOCTYPE html>
<html>
<head>
    <title>Nexora Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 340px;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 5px 0;
            color: #1e1b4b;
        }

        p {
            font-size: 13px;
            color: gray;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #4f46e5;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: #3730a3;
        }

        .privacy {
            margin-top: 12px;
            font-size: 12px;
        }

        .privacy a {
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- LOGO -->
    <img src="/static/nexora.png" class="logo">

    <h2>Nexora Academy</h2>
    <p>Sign in to continue learning</p>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="privacy">
        By continuing you accept our
        <a href="/privacy">Privacy Policy</a>
    </div>

</div>

</body>
</html>
